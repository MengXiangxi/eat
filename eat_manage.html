<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃什么 - 随机选择餐厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: #f4f3ef;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            max-width: 1100px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #4a6b5a;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #5a7a6a;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #c8ddd2;
            padding-bottom: 10px;
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0ddd8;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #6b9080;
        }

        textarea {
            resize: vertical;
            min-height: 48px;
        }

        button {
            padding: 12px 24px;
            background: #6b9080;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 144, 128, 0.25);
        }

        button:active {
            transform: translateY(0);
        }

        .random-section {
            text-align: center;
            padding: 30px;
            background: #e8efe8;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .random-section button {
            background: #4a6b5a;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 40px;
        }

        .result {
            margin-top: 20px;
            font-size: 2em;
            color: #4a6b5a;
            font-weight: bold;
            min-height: 50px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .vendor-list {
            display: grid;
            gap: 10px;
            max-height: 750px;
            overflow-y: auto;
        }

        .vendor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #fafaf8;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .vendor-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .vendor-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .vendor-name {
            font-size: 18px;
            font-weight: bold;
            color: #3a3a3a;
        }

        .vendor-weight {
            font-size: 14px;
            color: #6b9080;
            background: #e8efe8;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .vendor-item.zero-weight {
            opacity: 0.7;
        }

        .vendor-item.zero-weight .vendor-name,
        .vendor-item.zero-weight .vendor-weight {
            color: #aaa;
        }

        .vendor-item.zero-weight .vendor-weight {
            background: #f0efe8;
        }

        .vendor-actions,
        .meal-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .weight-edit-input {
            width: 80px;
            padding: 5px 8px;
            border: 2px solid #6b9080;
            border-radius: 5px;
            font-size: 14px;
        }

        .name-edit-input {
            width: 200px;
            padding: 5px 8px;
            border: 2px solid #6b9080;
            border-radius: 5px;
            font-size: 14px;
        }

        .edit-btn {
            background: #6b9080;
            padding: 8px 16px;
            font-size: 14px;
        }

        .edit-btn:hover {
            background: #5a7a6a;
        }

        .save-btn {
            background: #5a7a6a;
            padding: 8px 16px;
            font-size: 14px;
        }

        .save-btn:hover {
            background: #4a6b5a;
        }

        .cancel-btn {
            background: #9a9a9a;
            padding: 8px 16px;
            font-size: 14px;
        }

        .cancel-btn:hover {
            background: #858585;
        }

        .delete-btn {
            background: #c17b6b;
            padding: 8px 16px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #b06a5a;
        }

        .empty-message {
            text-align: center;
            color: #aaa;
            padding: 30px;
            font-style: italic;
        }

        .sort-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sort-control label {
            color: #888;
            font-size: 14px;
            font-weight: normal;
        }

        .meal-item {
            display: grid;
            grid-template-columns: 100px minmax(220px, 2fr) 100px 90px auto;
            gap: 15px;
            align-items: start;
            padding: 15px;
            background: #fafaf8;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .meal-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .meal-date {
            font-size: 14px;
            color: #888;
            font-weight: bold;
        }

        .meal-order {
            font-size: 16px;
            color: #3a3a3a;
            line-height: 1.5;
            word-break: break-word;
        }

        .meal-main {
            font-weight: bold;
            color: #3a3a3a;
        }

        .meal-note {
            margin-top: 4px;
            font-size: 14px;
            color: #888;
        }

        .meal-price {
            font-size: 16px;
            color: #5a7a6a;
            font-weight: bold;
        }

        .meal-rate {
            font-size: 14px;
            color: #c4956a;
        }

        .date-edit-input,
        .price-edit-input,
        .rate-edit-input,
        .meal-vendor-input,
        .meal-note-input {
            width: 100%;
            font-size: 14px;
        }

        .meal-note-input {
            min-height: 40px;
            padding: 8px;
        }

        .meal-order-editor {
            display: none;
            width: 100%;
        }

        .meal-order-editor.active {
            display: block;
        }

        .meal-order-editor .meal-vendor-input {
            margin-bottom: 8px;
        }

        .meal-other-hint {
            margin-top: 6px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 900px) {
            .meal-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 吃什么</h1>

        <div class="random-section">
            <button onclick="randomSelect()">🎲 随机选择一家餐厅</button>
            <div class="result" id="result"></div>
        </div>

        <div class="section">
            <h2>➕ 添加商家</h2>
            <div class="add-form">
                <input type="text" id="vendorName" placeholder="商家名称" />
                <input type="number" id="vendorWeight" placeholder="权重" value="100" min="0" />
                <button onclick="addVendor()">添加</button>
            </div>
        </div>

        <div class="section">
            <h2>📋 商家列表 <span id="totalWeight" style="font-size: 0.8em; color: #666;"></span></h2>
            <div class="sort-control">
                <label for="sortSelect">排序方式：</label>
                <select id="sortSelect" onchange="changeSortOrder()">
                    <option value="default">默认顺序</option>
                    <option value="name">按名称排序</option>
                    <option value="weight">按权重排序</option>
                </select>
            </div>
            <div class="vendor-list" id="vendorList"></div>
        </div>

        <div class="section">
            <h2>🍜 添加点餐记录</h2>
            <div class="add-form">
                <input type="date" id="mealDate" />
                <input type="text" id="mealVendor" list="vendorDatalist" placeholder="输入或选择商家" />
                <datalist id="vendorDatalist"></datalist>
                <textarea id="mealOrder" placeholder="可选：套餐/备注"></textarea>
                <input type="number" id="mealPrice" placeholder="价格" step="0.01" min="0" />
                <input type="number" id="mealRate" placeholder="评价(0.5-5，0.5步长)" min="0.5" max="5" step="0.5" value="3" />
                <button onclick="addMeal()">添加</button>
            </div>
        </div>

        <div class="section">
            <h2>📝 点餐记录</h2>
            <div class="vendor-list" id="mealList"></div>
        </div>
    </div>

    <script>
        let vendors = [];
        let originalVendors = [];
        let currentSortOrder = 'default';
        let meals = [];
        const API_URL = window.location.origin + '/api';

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getMealDisplayParts(meal) {
            const note = (meal.order || '').trim();
            return {
                main: meal.vendor_name || '未命名商家',
                note: note
            };
        }

        function getMealDisplayHtml(meal) {
            const parts = getMealDisplayParts(meal);
            return '<div class="meal-main">' + escapeHtml(parts.main) + '</div>' +
                (parts.note ? '<div class="meal-note">' + escapeHtml(parts.note) + '</div>' : '');
        }

        function renderMealVendorDatalist() {
            const datalist = document.getElementById('vendorDatalist');
            if (datalist) {
                datalist.innerHTML = originalVendors.map(function(vendor) {
                    return '<option value="' + escapeHtml(vendor.vendor) + '" data-id="' + vendor.id + '"></option>';
                }).join('');
            }

            meals.forEach(function(meal) {
                const datalist = document.getElementById('vendor-datalist-' + meal.id);
                if (datalist) {
                    datalist.innerHTML = originalVendors.map(function(vendor) {
                        return '<option value="' + escapeHtml(vendor.vendor) + '" data-id="' + vendor.id + '"></option>';
                    }).join('');
                }
            });
        }

        function getVendorIdByName(name) {
            const trimmed = (name || '').trim();
            const found = originalVendors.find(function(v) { return v.vendor === trimmed; });
            return found ? found.id : null;
        }

        function getVendorNameById(id) {
            if (id == null) return '';
            const found = originalVendors.find(function(v) { return v.id === id; });
            return found ? found.vendor : '';
        }

        function updateAddMealPlaceholder() {
            const textarea = document.getElementById('mealOrder');
            if (textarea) {
                textarea.placeholder = '可选：套餐/备注';
            }
        }

        function updateMealEditorPlaceholder(mealId) {
            const textarea = document.getElementById('meal-order-input-' + mealId);
            if (textarea) {
                textarea.placeholder = '可选：套餐/备注';
            }
        }

        function normalizeMealInput(dateValue, vendorNameValue, orderValue, priceValue, rateValue) {
            const date = dateValue.replace(/-/g, '').slice(2);
            const order = orderValue.trim();
            const price = parseFloat(priceValue);
            const rate = parseFloat(rateValue);

            if (!dateValue) {
                return { error: '请选择日期！' };
            }

            const vendorId = getVendorIdByName(vendorNameValue);
            if (vendorId == null) {
                return { error: '请输入有效的商家名称！' };
            }

            if (isNaN(price) || price < 0) {
                return { error: '请输入有效的价格！' };
            }

            if (isNaN(rate) || rate < 0.5 || rate > 5 || Math.abs(rate * 2 - Math.round(rate * 2)) > 1e-6) {
                return { error: '请输入0.5-5之间、0.5步长的评价！' };
            }

            return {
                payload: {
                    date: date,
                    vendor_id: vendorId,
                    order: order,
                    price: price,
                    rate: Math.round(rate * 2) / 2
                }
            };
        }

        function loadData() {
            fetch(API_URL + '/vendors')
                .then(response => response.json())
                .then(data => {
                    originalVendors = data;
                    vendors = data;
                    checkAndSetKJiWeight();

                    const savedSortOrder = localStorage.getItem('sortOrder');
                    if (savedSortOrder) {
                        currentSortOrder = savedSortOrder;
                        document.getElementById('sortSelect').value = savedSortOrder;
                        applySortOrder();
                    }

                    renderVendorList();
                    renderMealVendorDatalist();
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    alert('加载数据失败，请确保服务器正在运行！');
                });

            fetch(API_URL + '/meals')
                .then(response => response.json())
                .then(data => {
                    meals = data;
                    renderMealList();
                })
                .catch(error => {
                    console.error('Error loading meals:', error);
                    alert('加载点餐记录失败，请确保服务器正在运行！');
                });
        }

        function checkAndSetKJiWeight() {
            const kji = originalVendors.find(function(vendor) {
                return vendor.vendor === 'K记';
            });

            if (!kji) {
                return;
            }

            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const beijingTime = new Date(utc + (3600000 * 8));
            const dayOfWeek = beijingTime.getDay();
            const weight = (dayOfWeek === 4) ? 3000 : 100;

            fetch(API_URL + '/vendors/' + kji.id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ vendor: 'K记', weight: weight })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.log('自动设定K记权重失败:', data.error);
                    return;
                }
                originalVendors = data.vendors;
                applySortOrder();
                renderVendorList();
                renderMealVendorDatalist();
                console.log('已自动设定K记权重为:', weight, '(今天是' + (dayOfWeek === 4 ? '星期四' : '非星期四') + ')');
            })
            .catch(error => {
                console.error('Error setting K记 weight:', error);
            });
        }

        function addVendor() {
            const nameInput = document.getElementById('vendorName');
            const weightInput = document.getElementById('vendorWeight');
            const name = nameInput.value.trim();
            const weight = parseInt(weightInput.value, 10);

            if (!name) {
                alert('请输入商家名称！');
                return;
            }

            if (Number.isNaN(weight) || weight < 0) {
                alert('请输入有效的权重（大于等于0的整数）！');
                return;
            }

            fetch(API_URL + '/vendors', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ vendor: name, weight: weight })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    originalVendors = data.vendors;
                    vendors = data.vendors;
                    applySortOrder();
                    renderVendorList();
                    renderMealVendorDatalist();
                    nameInput.value = '';
                    weightInput.value = '100';
                    nameInput.focus();
                }
            })
            .catch(error => {
                console.error('Error adding vendor:', error);
                alert('添加失败，请确保服务器正在运行！');
            });
        }

        function deleteVendor(vendorId) {
            const vendor = vendors.find(function(item) {
                return item.id === vendorId;
            });

            if (!vendor) {
                alert('未找到商家');
                return;
            }

            if (confirm('确定要删除 "' + vendor.vendor + '" 吗？')) {
                fetch(API_URL + '/vendors/' + vendorId, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                    } else {
                        originalVendors = data.vendors;
                        vendors = data.vendors;
                        applySortOrder();
                        renderVendorList();
                        renderMealVendorDatalist();
                    }
                })
                .catch(error => {
                    console.error('Error deleting vendor:', error);
                    alert('删除失败，请确保服务器正在运行！');
                });
            }
        }

        function renderVendorList() {
            const listContainer = document.getElementById('vendorList');
            const totalWeightElement = document.getElementById('totalWeight');

            if (vendors.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">暂无商家，请先添加商家</div>';
                totalWeightElement.textContent = '';
                return;
            }

            const totalWeight = vendors.reduce(function(sum, vendor) {
                return sum + vendor.weight;
            }, 0);

            totalWeightElement.textContent = '(商家数量: ' + vendors.length + ', 总权重: ' + totalWeight + ')';

            listContainer.innerHTML = vendors.map(function(vendor) {
                const id = vendor.id;
                const zeroClass = vendor.weight === 0 ? ' zero-weight' : '';
                return '<div class="vendor-item' + zeroClass + '" id="vendor-' + id + '">' +
                    '<div class="vendor-info">' +
                    '<span class="vendor-name" id="name-display-' + id + '">' + escapeHtml(vendor.vendor) + '</span>' +
                    '<input type="text" class="name-edit-input" id="name-input-' + id + '" value="' + escapeHtml(vendor.vendor) + '" style="display: none;" />' +
                    '<span class="vendor-weight" id="weight-display-' + id + '">权重: ' + vendor.weight + '</span>' +
                    '<input type="number" class="weight-edit-input" id="weight-input-' + id + '" value="' + vendor.weight + '" min="0" style="display: none;" />' +
                    '</div>' +
                    '<div class="vendor-actions">' +
                    '<button class="edit-btn" id="edit-btn-' + id + '" onclick="editVendor(' + id + ')">编辑</button>' +
                    '<button class="save-btn" id="save-btn-' + id + '" onclick="saveVendor(' + id + ')" style="display: none;">保存</button>' +
                    '<button class="cancel-btn" id="cancel-btn-' + id + '" onclick="cancelEdit(' + id + ')" style="display: none;">取消</button>' +
                    '<button class="delete-btn" onclick="deleteVendor(' + id + ')">删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function editVendor(vendorId) {
            document.getElementById('name-display-' + vendorId).style.display = 'none';
            document.getElementById('name-input-' + vendorId).style.display = 'inline-block';
            document.getElementById('weight-display-' + vendorId).style.display = 'none';
            document.getElementById('weight-input-' + vendorId).style.display = 'inline-block';
            document.getElementById('edit-btn-' + vendorId).style.display = 'none';
            document.getElementById('save-btn-' + vendorId).style.display = 'inline-block';
            document.getElementById('cancel-btn-' + vendorId).style.display = 'inline-block';
            document.getElementById('name-input-' + vendorId).focus();
        }

        function cancelEdit(vendorId) {
            const vendor = vendors.find(function(item) {
                return item.id === vendorId;
            });
            if (!vendor) {
                return;
            }

            document.getElementById('name-display-' + vendorId).style.display = 'inline-block';
            document.getElementById('name-input-' + vendorId).style.display = 'none';
            document.getElementById('weight-display-' + vendorId).style.display = 'inline-block';
            document.getElementById('weight-input-' + vendorId).style.display = 'none';
            document.getElementById('edit-btn-' + vendorId).style.display = 'inline-block';
            document.getElementById('save-btn-' + vendorId).style.display = 'none';
            document.getElementById('cancel-btn-' + vendorId).style.display = 'none';
            document.getElementById('name-input-' + vendorId).value = vendor.vendor;
            document.getElementById('weight-input-' + vendorId).value = vendor.weight;
        }

        function saveVendor(vendorId) {
            const newName = document.getElementById('name-input-' + vendorId).value.trim();
            const newWeight = parseInt(document.getElementById('weight-input-' + vendorId).value, 10);

            if (!newName) {
                alert('请输入商家名称！');
                return;
            }

            if (Number.isNaN(newWeight) || newWeight < 0) {
                alert('请输入有效的权重（大于等于0的整数）！');
                return;
            }

            fetch(API_URL + '/vendors/' + vendorId, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ vendor: newName, weight: newWeight })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    originalVendors = data.vendors;
                    vendors = data.vendors;
                    applySortOrder();
                    renderVendorList();
                    renderMealVendorDatalist();
                }
            })
            .catch(error => {
                console.error('Error updating vendor:', error);
                alert('更新失败，请确保服务器正在运行！');
            });
        }

        function changeSortOrder() {
            const sortSelect = document.getElementById('sortSelect');
            currentSortOrder = sortSelect.value;
            localStorage.setItem('sortOrder', currentSortOrder);
            applySortOrder();
            renderVendorList();
        }

        function applySortOrder() {
            if (currentSortOrder === 'default') {
                vendors = [...originalVendors];
            } else if (currentSortOrder === 'name') {
                vendors = [...originalVendors].sort(function(a, b) {
                    return a.vendor.localeCompare(b.vendor, 'zh-CN');
                });
            } else if (currentSortOrder === 'weight') {
                vendors = [...originalVendors].sort(function(a, b) {
                    return b.weight - a.weight;
                });
            }
        }

        function randomSelect() {
            const resultDiv = document.getElementById('result');

            if (vendors.length === 0) {
                resultDiv.textContent = '没有可选择的商家！';
                return;
            }

            const totalWeight = vendors.reduce(function(sum, vendor) {
                return sum + vendor.weight;
            }, 0);

            if (totalWeight <= 0) {
                resultDiv.textContent = '权重总和为0，无法随机选择';
                return;
            }

            let random = Math.random() * totalWeight;

            for (let i = 0; i < vendors.length; i++) {
                random -= vendors[i].weight;
                if (random <= 0) {
                    resultDiv.textContent = '🎉 ' + vendors[i].vendor;
                    return;
                }
            }

            resultDiv.textContent = '🎉 ' + vendors[vendors.length - 1].vendor;
        }

        function buildStars(rate) {
            const value = Number(rate) || 0;
            const fullStars = Math.floor(value);
            const hasHalf = Math.abs(value - fullStars - 0.5) < 0.01;
            return '★'.repeat(fullStars) + (hasHalf ? '⯨' : '');
        }

        async function addMeal() {
            const dateInput = document.getElementById('mealDate');
            const vendorInput = document.getElementById('mealVendor');
            const orderInput = document.getElementById('mealOrder');
            const priceInput = document.getElementById('mealPrice');
            const rateInput = document.getElementById('mealRate');

            const normalized = normalizeMealInput(
                dateInput.value,
                vendorInput.value,
                orderInput.value,
                priceInput.value,
                rateInput.value
            );

            if (normalized.error) {
                alert(normalized.error);
                return;
            }

            try {
                const response = await fetch(API_URL + '/meals', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(normalized.payload)
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    alert(data.error || '添加失败');
                    return;
                }

                meals = data.meals;
                renderMealList();
                dateInput.value = '';
                vendorInput.value = '';
                orderInput.value = '';
                priceInput.value = '';
                rateInput.value = '3';
                updateAddMealPlaceholder();
                vendorInput.focus();
            } catch (error) {
                console.error('Error adding meal:', error);
                alert('添加失败，请确保服务器正在运行！');
            }
        }

        function renderMealList() {
            const listContainer = document.getElementById('mealList');

            if (meals.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">暂无点餐记录</div>';
                return;
            }

            const sortedMeals = [...meals].sort(function(a, b) {
                if (a.date === b.date) {
                    return b.id - a.id;
                }
                return b.date.localeCompare(a.date);
            });

            listContainer.innerHTML = sortedMeals.map(function(meal) {
                const id = meal.id;
                const stars = buildStars(meal.rate);
                const rateText = (Math.round(Number(meal.rate || 0) * 2) / 2).toString().replace(/\.0$/, '');
                const displayDate = '20' + meal.date.slice(0, 2) + '-' + meal.date.slice(2, 4) + '-' + meal.date.slice(4, 6);
                const vendorValue = meal.vendor_id != null ? String(meal.vendor_id) : '';

                return '<div class="meal-item" id="meal-' + id + '">' +
                    '<span class="meal-date" id="meal-date-display-' + id + '">' + displayDate + '</span>' +
                    '<input type="date" class="date-edit-input" id="meal-date-input-' + id + '" value="20' + meal.date.slice(0, 2) + '-' + meal.date.slice(2, 4) + '-' + meal.date.slice(4, 6) + '" style="display: none;" />' +
                    '<div class="meal-order" id="meal-order-display-' + id + '">' + getMealDisplayHtml(meal) + '</div>' +
                    '<div class="meal-order-editor" id="meal-order-editor-' + id + '">' +
                    '<input type="text" class="meal-vendor-input" id="meal-vendor-input-' + id + '" list="vendor-datalist-' + id + '" placeholder="输入或选择商家" value="' + escapeHtml(meal.vendor_name || '') + '" />' +
                    '<datalist id="vendor-datalist-' + id + '"></datalist>' +
                    '<textarea class="meal-note-input" id="meal-order-input-' + id + '">' + escapeHtml(meal.order || '') + '</textarea>' +
                    '<div class="meal-other-hint" id="meal-other-hint-' + id + '"></div>' +
                    '</div>' +
                    '<span class="meal-price" id="meal-price-display-' + id + '">¥' + Number(meal.price).toFixed(2) + '</span>' +
                    '<input type="number" class="price-edit-input" id="meal-price-input-' + id + '" value="' + meal.price + '" step="0.01" min="0" style="display: none;" />' +
                    '<span class="meal-rate" id="meal-rate-display-' + id + '" title="评分: ' + rateText + '">' + stars + '</span>' +
                    '<input type="number" class="rate-edit-input" id="meal-rate-input-' + id + '" value="' + meal.rate + '" min="0.5" max="5" step="0.5" style="display: none;" />' +
                    '<div class="meal-actions">' +
                    '<button class="edit-btn" id="meal-edit-btn-' + id + '" onclick="editMeal(' + id + ')">编辑</button>' +
                    '<button class="save-btn" id="meal-save-btn-' + id + '" onclick="saveMeal(' + id + ')" style="display: none;">保存</button>' +
                    '<button class="cancel-btn" id="meal-cancel-btn-' + id + '" onclick="cancelEditMeal(' + id + ')" style="display: none;">取消</button>' +
                    '<button class="delete-btn" onclick="deleteMeal(' + id + ')">删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('');

            renderMealVendorDatalist();
        }

        function editMeal(mealId) {
            document.getElementById('meal-date-display-' + mealId).style.display = 'none';
            document.getElementById('meal-date-input-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-order-display-' + mealId).style.display = 'none';
            document.getElementById('meal-order-editor-' + mealId).classList.add('active');
            document.getElementById('meal-price-display-' + mealId).style.display = 'none';
            document.getElementById('meal-price-input-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-rate-display-' + mealId).style.display = 'none';
            document.getElementById('meal-rate-input-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-edit-btn-' + mealId).style.display = 'none';
            document.getElementById('meal-save-btn-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-cancel-btn-' + mealId).style.display = 'inline-block';
            updateMealEditorPlaceholder(mealId);
        }

        function cancelEditMeal(mealId) {
            const meal = meals.find(function(item) {
                return item.id === mealId;
            });
            if (!meal) {
                return;
            }

            document.getElementById('meal-date-display-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-date-input-' + mealId).style.display = 'none';
            document.getElementById('meal-order-display-' + mealId).style.display = 'block';
            document.getElementById('meal-order-editor-' + mealId).classList.remove('active');
            document.getElementById('meal-price-display-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-price-input-' + mealId).style.display = 'none';
            document.getElementById('meal-rate-display-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-rate-input-' + mealId).style.display = 'none';
            document.getElementById('meal-edit-btn-' + mealId).style.display = 'inline-block';
            document.getElementById('meal-save-btn-' + mealId).style.display = 'none';
            document.getElementById('meal-cancel-btn-' + mealId).style.display = 'none';

            const displayDate = '20' + meal.date.slice(0, 2) + '-' + meal.date.slice(2, 4) + '-' + meal.date.slice(4, 6);
            document.getElementById('meal-date-input-' + mealId).value = displayDate;
            document.getElementById('meal-vendor-input-' + mealId).value = meal.vendor_name || '';
            document.getElementById('meal-order-input-' + mealId).value = meal.order || '';
            document.getElementById('meal-price-input-' + mealId).value = meal.price;
            document.getElementById('meal-rate-input-' + mealId).value = meal.rate;
            updateMealEditorPlaceholder(mealId);
        }

        async function saveMeal(mealId) {
            const normalized = normalizeMealInput(
                document.getElementById('meal-date-input-' + mealId).value,
                document.getElementById('meal-vendor-input-' + mealId).value,
                document.getElementById('meal-order-input-' + mealId).value,
                document.getElementById('meal-price-input-' + mealId).value,
                document.getElementById('meal-rate-input-' + mealId).value
            );

            if (normalized.error) {
                alert(normalized.error);
                return;
            }

            try {
                const response = await fetch(API_URL + '/meals/' + mealId, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(normalized.payload)
                });

                const data = await response.json();
                if (!response.ok || data.error) {
                    alert(data.error || '更新失败');
                    return;
                }

                meals = data.meals;
                renderMealList();
            } catch (error) {
                console.error('Error updating meal:', error);
                alert('更新失败，请确保服务器正在运行！');
            }
        }

        function deleteMeal(mealId) {
            if (confirm('确定要删除这条点餐记录吗？')) {
                fetch(API_URL + '/meals/' + mealId, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                    } else {
                        meals = data.meals;
                        renderMealList();
                    }
                })
                .catch(error => {
                    console.error('Error deleting meal:', error);
                    alert('删除失败，请确保服务器正在运行！');
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('mealDate').value = today;

            document.getElementById('vendorName').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addVendor();
                }
            });

            document.getElementById('vendorWeight').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addVendor();
                }
            });

            document.getElementById('mealVendor').addEventListener('change', function() {
                updateAddMealPlaceholder();
            });

            document.getElementById('mealOrder').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    addMeal();
                }
            });

            document.getElementById('mealPrice').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addMeal();
                }
            });

            document.getElementById('mealRate').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addMeal();
                }
            });
        });
    </script>
</body>
</html>
