<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃什么 - 随机选择餐厅</title>
    <link rel="stylesheet" href="/common.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .vendor-list {
            max-height: 500px;
        }

        .meal-item {
            grid-template-columns: 100px 1fr 100px 80px;
            align-items: center;
        }

        .read-only-notice {
            background: #f5f0e8;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--color-text-label);
        }

        .read-only-notice h3 {
            margin-bottom: 10px;
            color: #8a7a6a;
        }

        .manage-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--color-accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .manage-link:hover {
            background: var(--color-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 吃什么</h1>

        <div class="random-section">
            <button onclick="randomSelect()">🎲 随机选择一家餐厅</button>
            <div class="result" id="result"></div>
        </div>

        <div class="section">
            <h2>📋 商家列表 <span id="totalWeight" style="font-size: 0.8em; color: #666;"></span></h2>
            <div class="sort-control">
                <label for="sortSelect">排序方式：</label>
                <select id="sortSelect" onchange="changeSortOrder()">
                    <option value="default">默认顺序</option>
                    <option value="name">按名称排序</option>
                    <option value="weight">按权重排序</option>
                </select>
            </div>
            <div class="vendor-list" id="vendorList"></div>
        </div>

        <div class="section">
            <h2>📝 点餐记录</h2>
            <div class="vendor-list" id="mealList"></div>
        </div>
    </div>

    <script>
        let vendors = [];
        let originalVendors = [];
        let currentSortOrder = 'default';
        let meals = [];
        const API_URL = (window.location.protocol === 'file:')
            ? 'http://localhost:5001/api'
            : '/api';

        function loadData() {
            fetch(API_URL + '/vendors')
                .then(response => response.json())
                .then(data => {
                    originalVendors = data;
                    vendors = data.filter(function(v) { return v.weight > 0; });
                    checkAndSetKJiWeight();

                    const savedSortOrder = localStorage.getItem('sortOrder');
                    if (savedSortOrder) {
                        currentSortOrder = savedSortOrder;
                        document.getElementById('sortSelect').value = savedSortOrder;
                        applySortOrder();
                    }

                    renderVendorList();
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    alert('加载数据失败，请确保服务器正在运行！');
                });

            fetch(API_URL + '/meals')
                .then(response => response.json())
                .then(data => {
                    meals = data;
                    renderMealList();
                })
                .catch(error => {
                    console.error('Error loading meals:', error);
                    alert('加载点餐记录失败，请确保服务器正在运行！');
                });
        }

        function checkAndSetKJiWeight() {
            const kji = originalVendors.find(function(vendor) {
                return vendor.vendor === 'K记';
            });

            if (!kji) {
                return;
            }

            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const beijingTime = new Date(utc + (3600000 * 8));
            const dayOfWeek = beijingTime.getDay();
            const weight = (dayOfWeek === 4) ? 1000 : 100;

            fetch(API_URL + '/vendors/' + kji.id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ vendor: 'K记', weight: weight })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.log('自动设定K记权重失败:', data.error);
                    return;
                }
                originalVendors = data.vendors;
                vendors = originalVendors.filter(function(v) { return v.weight > 0; });
                applySortOrder();
                renderVendorList();
                console.log('已自动设定K记权重为:', weight, '(今天是' + (dayOfWeek === 4 ? '星期四' : '非星期四') + ')');
            })
            .catch(error => {
                console.error('Error setting K记 weight:', error);
            });
        }

        function changeSortOrder() {
            const sortSelect = document.getElementById('sortSelect');
            currentSortOrder = sortSelect.value;
            localStorage.setItem('sortOrder', currentSortOrder);
            applySortOrder();
            renderVendorList();
        }

        function applySortOrder() {
            var filtered = originalVendors.filter(function(v) { return v.weight > 0; });
            if (currentSortOrder === 'default') {
                vendors = filtered;
            } else if (currentSortOrder === 'name') {
                vendors = [...filtered].sort(function(a, b) {
                    return a.vendor.localeCompare(b.vendor, 'zh-CN');
                });
            } else if (currentSortOrder === 'weight') {
                vendors = [...filtered].sort(function(a, b) {
                    return b.weight - a.weight;
                });
            }
        }

        function renderVendorList() {
            const listContainer = document.getElementById('vendorList');
            const totalWeightElement = document.getElementById('totalWeight');

            if (vendors.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">暂无商家</div>';
                totalWeightElement.textContent = '';
                return;
            }

            const totalWeight = vendors.reduce(function(sum, vendor) {
                return sum + vendor.weight;
            }, 0);

            totalWeightElement.textContent = '(商家数量: ' + vendors.length + ', 总权重: ' + totalWeight + ')';

            listContainer.innerHTML = vendors.map(function(vendor) {
                return '<div class="vendor-item">' +
                    '<div class="vendor-info">' +
                    '<span class="vendor-name">' + vendor.vendor + '</span>' +
                    '<span class="vendor-weight">权重: ' + vendor.weight + '</span>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function randomSelect() {
            const resultDiv = document.getElementById('result');

            if (vendors.length === 0) {
                resultDiv.textContent = '没有可选择的商家！';
                return;
            }

            const totalWeight = vendors.reduce(function(sum, vendor) {
                return sum + vendor.weight;
            }, 0);

            if (totalWeight <= 0) {
                resultDiv.textContent = '权重总和为0，无法随机选择';
                return;
            }

            let random = Math.random() * totalWeight;

            for (let i = 0; i < vendors.length; i++) {
                random -= vendors[i].weight;
                if (random <= 0) {
                    resultDiv.textContent = '🎉 ' + vendors[i].vendor;
                    return;
                }
            }

            resultDiv.textContent = '🎉 ' + vendors[vendors.length - 1].vendor;
        }

        function buildStars(rate) {
            const value = Number(rate) || 0;
            const fullStars = Math.floor(value);
            const hasHalf = Math.abs(value - fullStars - 0.5) < 0.01;
            return '★'.repeat(fullStars) + (hasHalf ? '⯨' : '');
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getMealOrderHtml(meal) {
            var note = (meal.order || '').trim();
            var name = meal.vendor_name || '';
            return '<div class="meal-main">' + escapeHtml(name) + '</div>' +
                (note ? '<div class="meal-note">' + escapeHtml(note) + '</div>' : '');
        }

        function renderMealList() {
            const listContainer = document.getElementById('mealList');

            if (meals.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">暂无点餐记录</div>';
                return;
            }

            const sortedMeals = [...meals].sort(function(a, b) {
                if (a.date === b.date) {
                    return b.id - a.id;
                }
                return b.date.localeCompare(a.date);
            });

            listContainer.innerHTML = sortedMeals.map(function(meal) {
                const stars = meal.rate ? buildStars(meal.rate) : '';
                const rateText = (Math.round(Number(meal.rate || 0) * 2) / 2).toString().replace(/\.0$/, '');
                const displayDate = '20' + meal.date.slice(0, 2) + '-' + meal.date.slice(2, 4) + '-' + meal.date.slice(4, 6);
                const priceText = isNaN(meal.price) ? meal.price : Number(meal.price).toFixed(2);

                return '<div class="meal-item">' +
                    '<span class="meal-date">' + displayDate + '</span>' +
                    '<span class="meal-order">' + getMealOrderHtml(meal) + '</span>' +
                    '<span class="meal-price">¥' + priceText + '</span>' +
                    '<span class="meal-rate" title="评分: ' + rateText + '">' + stars + '</span>' +
                    '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>
</body>
</html>
